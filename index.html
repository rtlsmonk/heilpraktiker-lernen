<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Heilpraktiker Akademie Pro</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');

        :root {
            --bg: #0f172a;
            --sidebar-bg: #1e293b;
            --card-bg: #1e293b;
            --text: #f1f5f9;
            --text-dim: #94a3b8;
            --accent: #38bdf8;
            --tab-bg: #334155;
            --border: #475569;
            --shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        body.light {
            --bg: #cbd5e1; 
            --sidebar-bg: #f1f5f9; 
            --card-bg: #ffffff; 
            --text: #0f172a; 
            --text-dim: #475569;
            --accent: #0284c7;
            --tab-bg: #e2e8f0; 
            --border: #94a3b8; 
            --shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            transition: background 0.3s ease;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .sidebar {
            width: 340px;
            background: var(--sidebar-bg);
            height: 100vh;
            position: fixed;
            padding: 30px 20px;
            border-right: 2px solid var(--border);
            overflow-y: auto;
            z-index: 100;
        }

        .sidebar h2 {
            font-size: 0.9rem;
            font-weight: 800;
            margin-bottom: 30px;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 2px;
            text-align: center;
        }

        .tab {
            padding: 15px 18px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 10px;
            font-size: 0.9rem;
            font-weight: 700;
            background: var(--tab-bg);
            border: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: var(--text);
        }

        .tab.active { background: var(--accent); color: #ffffff; border-color: var(--accent); }
        .tab-count { font-size: 0.7rem; background: rgba(0,0,0,0.2); padding: 3px 8px; border-radius: 6px; }

        .main {
            margin-left: 340px;
            flex: 1;
            padding: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: var(--card-bg);
            padding: 40px;
            border-radius: 24px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }

        .top-nav {
            position: fixed;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
            z-index: 1000;
        }

        .nav-btn {
            padding: 10px 18px;
            border-radius: 10px;
            background: var(--card-bg);
            color: var(--text);
            border: 2px solid var(--border);
            cursor: pointer;
            font-weight: 800;
            font-size: 0.75rem;
        }

        .question-picker {
            display: flex;
            gap: 6px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .q-dot {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            background: var(--tab-bg);
            border: 1px solid var(--border);
            font-size: 0.8rem;
            font-weight: 800;
            cursor: not-allowed;
            opacity: 0.3;
        }

        .q-dot.unlocked { cursor: pointer; opacity: 1; border-color: var(--accent); color: var(--accent); }
        .q-dot.active { background: var(--accent); color: white; border-color: var(--accent); }

        .progress-info { display: flex; justify-content: space-between; font-size: 0.75rem; font-weight: 800; color: var(--accent); margin-bottom: 8px; text-transform: uppercase; }
        .progress-bar { height: 8px; background: var(--bg); border-radius: 10px; margin-bottom: 20px; border: 1px solid var(--border); overflow: hidden; }
        .progress-fill { height: 100%; background: var(--accent); width: 0%; transition: width 0.4s ease; }
        
        h1 { font-size: clamp(1.1rem, 3.5vw, 1.7rem); line-height: 1.4; margin-bottom: 25px; overflow-wrap: break-word; }
        
        .options-list { display: grid; gap: 10px; }
        .option-btn { 
            background: var(--tab-bg); border: 2px solid var(--border); padding: clamp(10px, 2.5vh, 18px) 18px; 
            border-radius: 16px; color: var(--text); text-align: left; 
            font-size: clamp(0.85rem, 3.2vw, 1.05rem); cursor: pointer; font-weight: 600; width: 100%; 
            line-height: 1.2; word-wrap: break-word;
        }
        .option-btn.correct { background: #10b981 !important; color: white !important; border-color: #059669; }
        .option-btn.wrong { background: #ef4444 !important; color: white !important; border-color: #b91c1c; }
        
        .next-btn { margin-top: 25px; background: var(--accent); color: white; border: none; padding: 15px 40px; border-radius: 14px; font-weight: 800; cursor: pointer; float: right; font-size: 0.9rem; }
        .next-btn:disabled { display: none; }

        .show-mobile { display: none; }
        .show-desktop { display: inline; }

        @media (max-width: 1000px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; height: auto; position: relative; padding: 20px; border-right: none; border-bottom: 2px solid var(--border); order: 2; }
            .main { margin-left: 0; padding: 10px; order: 1; }
            .container { padding: 20px; margin-top: 60px; width: 95%; }
            .top-nav { position: absolute; top: 15px; right: 10px; }
            .show-mobile { display: inline; }
            .show-desktop { display: none; }
            body.quiz-active .sidebar { display: none; }
            .next-btn { width: 100%; float: none; }
        }
    </style>
</head>
<body>

<div class="top-nav">
    <button class="nav-btn" onclick="goHome()">🏠 HAUPTMENÜ</button>
    <button class="nav-btn" id="toggleMode">MODUS 🌓</button>
</div>

<div class="sidebar" id="sidebar">
    <h2>Lernblock</h2>
    <div id="navigation"></div>
</div>

<div class="main">
    <div class="container">
        <div id="quiz-view" style="display: none;">
            <div id="mini-result" style="display:none; text-align: center; border-bottom: 2px solid var(--border); margin-bottom: 20px; padding-bottom: 15px;">
                <h2 style="color: var(--accent); font-size: 1.8rem;" id="mini-score">0/10</h2>
                <p id="mini-feedback" style="font-size: 0.9rem; opacity: 0.8;"></p>
            </div>

            <div class="progress-info">
                <span id="category-name">Thema</span>
                <span id="question-counter">01 / 10</span>
            </div>
            <div class="progress-bar"><div class="progress-fill" id="p-fill"></div></div>
            
            <div class="question-picker" id="questionPicker"></div>

            <h1 id="q-text">Frage wird geladen...</h1>
            <div class="options-list" id="options"></div>
            
            <div style="margin-top: 25px; overflow: hidden;">
                <button class="next-btn" id="nextBtn" disabled>WEITER</button>
                <button class="next-btn" id="finalHomeBtn" style="display:none; background: var(--tab-bg); border: 1px solid var(--border); float: left;" onclick="goHome()">BEENDEN</button>
            </div>
        </div>

        <div id="start-view" style="text-align: center;">
            <div style="font-size: 4rem; margin-bottom: 20px;">📘</div>
            <h1>Grundwissen Heilpraktiker.</h1>
            <p style="color: var(--text-dim); margin-bottom: 40px; font-size: 1.2rem; line-height: 1.6;">
                Bitte wählen Sie <span class="show-desktop">links</span><span class="show-mobile">unten</span> eine Lerneinheit aus.
            </p>
            <div style="padding: 25px; background: var(--tab-bg); border: 2px solid var(--border); border-radius: 20px;">
                <b>Hinweis:</b> Nutzen Sie den Modus-Schalter oben rechts für optimales Licht.
            </div>
        </div>
    </div>
</div>

let qIdx = 0; let currentCat = "";
let userAnswers = []; let maxReached = 0; let isResultMode = false;

function initNav() {
    const nav = document.getElementById('navigation');
    for (let cat in examDB) {
        const tab = document.createElement('div');
        tab.className = 'tab';
        tab.innerHTML = `<span>${cat}</span> <span class="tab-count">10</span>`;
        tab.onclick = () => startQuiz(cat, tab);
        nav.appendChild(tab);
    }
}

function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
}

function startQuiz(cat, element) {
    currentCat = cat; qIdx = 0; maxReached = 0; isResultMode = false;
    userAnswers = new Array(10).fill(null);
    document.body.classList.add('quiz-active');
    document.getElementById('start-view').style.display = 'none';
    document.getElementById('quiz-view').style.display = 'block';
    document.getElementById('mini-result').style.display = 'none';
    document.getElementById('finalHomeBtn').style.display = 'none';
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    if(element) element.classList.add('active');
    examDB[currentCat].forEach(q => { q.shuffled = q.shuffled || shuffle([...q.a]); });
    loadQ();
}

function loadQ() {
    const q = examDB[currentCat][qIdx];
    const nextBtn = document.getElementById('nextBtn');
    
    document.getElementById('category-name').innerText = currentCat;
    document.getElementById('question-counter').innerText = `${qIdx + 1} / 10`;
    document.getElementById('p-fill').style.width = ((qIdx + 1) / 10 * 100) + "%";
    document.getElementById('q-text').innerText = q.q;
    
    updatePicker();

    const opts = document.getElementById('options');
    opts.innerHTML = '';
    
    q.shuffled.forEach(txt => {
        const b = document.createElement('button');
        b.className = 'option-btn';
        b.innerText = txt;
        
        if(userAnswers[qIdx] !== null) {
            if(txt === q.c) b.classList.add('correct');
            if(txt === userAnswers[qIdx] && txt !== q.c) b.classList.add('wrong');
            b.disabled = true;
        } else {
            b.onclick = () => selectAnswer(txt, b);
        }
        opts.appendChild(b);
    });

    if(isResultMode) {
        nextBtn.style.display = "none";
        document.getElementById('finalHomeBtn').style.display = "block";
    } else {
        nextBtn.style.display = "block";
        nextBtn.innerText = qIdx === 9 ? "ZUR AUSWERTUNG" : "WEITER";
        nextBtn.disabled = userAnswers[qIdx] === null;
    }
}

function selectAnswer(txt, btn) {
    const q = examDB[currentCat][qIdx];
    userAnswers[qIdx] = txt;
    if(qIdx > maxReached) maxReached = qIdx;
    
    document.querySelectorAll('.option-btn').forEach(b => {
        b.disabled = true;
        if(b.innerText === q.c) b.classList.add('correct');
    });
    if(txt !== q.c) btn.classList.add('wrong');
    document.getElementById('nextBtn').disabled = false;
    updatePicker();
}

function updatePicker() {
    const picker = document.getElementById('questionPicker');
    picker.innerHTML = '';
    for(let i=0; i<10; i++) {
        const dot = document.createElement('div');
        dot.className = 'q-dot';
        dot.innerText = i+1;
        if(i <= maxReached || isResultMode) {
            dot.classList.add('unlocked');
            dot.onclick = () => { qIdx = i; loadQ(); };
        }
        if(i === qIdx) dot.classList.add('active');
        picker.appendChild(dot);
    }
}

document.getElementById('nextBtn').onclick = () => {
    if(qIdx < 9) { qIdx++; if(qIdx > maxReached) maxReached = qIdx; loadQ(); }
    else showFinalResults();
    window.scrollTo(0,0);
};

function showFinalResults() {
    isResultMode = true;
    let finalScore = 0;
    userAnswers.forEach((ans, i) => { if(ans === examDB[currentCat][i].c) finalScore++; });
    
    document.getElementById('mini-result').style.display = 'block';
    document.getElementById('mini-score').innerText = `${finalScore}/10`;
    document.getElementById('mini-feedback').innerText = finalScore >= 7 ? 
        "Hervorragendes Fachwissen! Sie sind bereit für die Prüfung." : 
        "Gute Basis, aber vertiefen Sie dieses Thema noch einmal.";
    
    qIdx = 0; // Zurück zur ersten Frage für die Analyse
    loadQ();
}

function goHome() {
    document.body.classList.remove('quiz-active');
    document.getElementById('quiz-view').style.display = 'none';
    document.getElementById('start-view').style.display = 'block';
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    window.scrollTo(0,0);
}

document.getElementById('toggleMode').onclick = () => document.body.classList.toggle('light');
initNav();
</script>
</body>
</html>
