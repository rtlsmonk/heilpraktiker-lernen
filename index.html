<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heilpraktiker Akademie Pro - High Contrast Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');

        :root {
            --bg: #0f172a;
            --sidebar-bg: #1e293b;
            --card-bg: #1e293b;
            --text: #f1f5f9;
            --text-dim: #94a3b8;
            --accent: #38bdf8;
            --tab-bg: #334155;
            --border: #475569;
            --shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        body.light {
            --bg: #cbd5e1; 
            --sidebar-bg: #f1f5f9; 
            --card-bg: #ffffff; 
            --text: #0f172a; 
            --text-dim: #475569;
            --accent: #0284c7;
            --tab-bg: #e2e8f0; 
            --border: #94a3b8; 
            --shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            transition: background 0.3s ease, color 0.3s ease;
            min-height: 100vh;
        }

        .sidebar {
            width: 340px;
            background: var(--sidebar-bg);
            height: 100vh;
            position: fixed;
            padding: 40px 20px;
            border-right: 2px solid var(--border);
            overflow-y: auto;
            z-index: 100;
        }

        .sidebar h2 {
            font-size: 0.9rem;
            font-weight: 800;
            margin-bottom: 40px;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 2px;
            text-align: center;
        }

        .tab {
            padding: 18px 20px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-bottom: 12px;
            font-size: 0.95rem;
            font-weight: 700;
            background: var(--tab-bg);
            border: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: var(--text);
        }

        .tab:hover {
            border-color: var(--accent);
            transform: scale(1.02);
            background: var(--sidebar-bg);
        }

        .tab.active {
            background: var(--accent);
            color: #ffffff;
            border-color: var(--accent);
            box-shadow: 0 4px 15px rgba(2, 132, 199, 0.4);
        }

        .tab-count {
            font-size: 0.75rem;
            background: rgba(0,0,0,0.2);
            padding: 4px 10px;
            border-radius: 8px;
            color: white;
        }

        .main {
            margin-left: 340px;
            flex: 1;
            padding: 60px 40px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: var(--card-bg);
            padding: 50px;
            border-radius: 24px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }

        .progress-info {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            font-weight: 800;
            color: var(--accent);
            margin-bottom: 12px;
            text-transform: uppercase;
        }

        .progress-bar {
            height: 10px;
            background: var(--bg);
            border-radius: 20px;
            margin-bottom: 50px;
            border: 1px solid var(--border);
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--accent);
            width: 0%;
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        h1 { font-size: 1.8rem; line-height: 1.4; margin-bottom: 40px; }

        .options-list { display: grid; gap: 15px; }

        .option-btn {
            background: var(--tab-bg);
            border: 2px solid var(--border);
            padding: 22px;
            border-radius: 16px;
            color: var(--text);
            text-align: left;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 600;
            width: 100%;
        }

        .option-btn:hover:not(:disabled) {
            border-color: var(--accent);
            background: var(--bg);
        }

        .option-btn.correct { background: #10b981 !important; color: white !important; border-color: #059669; }
        .option-btn.wrong { background: #ef4444 !important; color: white !important; border-color: #b91c1c; }

        .next-btn {
            margin-top: 40px;
            background: var(--accent);
            color: white;
            border: none;
            padding: 18px 45px;
            border-radius: 14px;
            font-weight: 800;
            cursor: pointer;
            float: right;
            box-shadow: 0 10px 20px rgba(2, 132, 199, 0.3);
        }

        .next-btn:disabled { opacity: 0; pointer-events: none; }

        .theme-switch {
            position: fixed;
            top: 25px;
            right: 25px;
            padding: 12px 24px;
            border-radius: 14px;
            background: var(--card-bg);
            color: var(--text);
            border: 2px solid var(--border);
            cursor: pointer;
            font-weight: 800;
            z-index: 1000;
            box-shadow: var(--shadow);
        }

        @media (max-width: 1000px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; height: auto; position: relative; border-right: none; border-bottom: 2px solid var(--border); }
            .main { margin-left: 0; padding: 20px; }
        }
    </style>
</head>
<body>

<button class="theme-switch" id="toggleMode">MODUS WECHSELN 🌓</button>

<div class="sidebar">
    <h2>Lernblock</h2>
    <div id="navigation"></div>
</div>

<div class="main">
    <div class="container">
        <div id="quiz-view" style="display: none;">
            <div class="progress-info">
                <span id="category-name">Thema</span>
                <span id="question-counter">01 / 10</span>
            </div>
            <div class="progress-bar"><div class="progress-fill" id="p-fill"></div></div>
            <h1 id="q-text">Frage wird geladen...</h1>
            <div class="options-list" id="options"></div>
            <button class="next-btn" id="nextBtn" disabled>WEITER</button>
        </div>

        <div id="start-view" style="text-align: center;">
            <div style="font-size: 4rem; margin-bottom: 20px;">📘</div>
            <h1>Grundwissen Heilpraktiker.</h1>
            <p style="color: var(--text-dim); margin-bottom: 40px; font-size: 1.2rem; line-height: 1.6;">
                Bitte wählen Sie links eine Lerneinheit aus.
            </p>
            <div style="padding: 25px; background: var(--tab-bg); border: 2px solid var(--border); border-radius: 20px;">
                <b>Hinweis:</b> Nutzen Sie den Modus-Schalter oben rechts, um das Design an die Lichtverhältnisse im Raum anzupassen.
            </div>
        </div>

        <div id="result-screen" style="display: none; text-align: center;">
            <h1>Auswertung</h1>
            <div style="font-size: 5rem; font-weight: 800; color: var(--accent); margin: 30px 0;" id="score-val">0/10</div>
            <p id="feedback-text" style="font-size: 1.3rem; margin-bottom: 40px;"></p>
            <button class="next-btn" style="float:none;" id="backToMenuBtn">HAUPTMENÜ</button>
        </div>
    </div>
</div>

<script>
const examDB = {
    "1. Herz & Kreislauf": [
        {q: "Welche Schicht des Herzens ist für die Kontraktion verantwortlich?", a: ["Endokard", "Myokard", "Epikard", "Perikard"], c: "Myokard"},
        {q: "Wo entspringen die Koronararterien?", a: ["Aus der Vena Cava", "Aus der Arteria Pulmonalis", "Aus dem Aortensinus", "Aus dem linken Vorhof"], c: "Aus dem Aortensinus"},
        {q: "Welche Klappe liegt zwischen rechtem Vorhof und rechter Kammer?", a: ["Mitralklappe", "Aortenklappe", "Trikuspidalklappe", "Pulmonalklappe"], c: "Trikuspidalklappe"},
        {q: "Was beschreibt die Windkesselfunktion?", a: ["Blutfilterung", "Druckausgleich der Aorta", "Sauerstoffaufnahme", "Reizleitung"], c: "Druckausgleich der Aorta"},
        {q: "Wie hoch ist das Schlagvolumen in Ruhe ca.?", a: ["70 ml", "150 ml", "500 ml", "20 ml"], c: "70 ml"},
        {q: "Welches Gefäß führt sauerstoffreiches Blut zum Herzen?", a: ["Vena Cava", "Vena Pulmonalis", "Arteria Pulmonalis", "Vena Portae"], c: "Vena Pulmonalis"},
        {q: "Wo liegt der primäre Schrittmacher des Herzens?", a: ["AV-Knoten", "His-Bündel", "Sinusknoten", "Purkinje-Fasern"], c: "Sinusknoten"},
        {q: "Zeichen für Linksherzinsuffizienz?", a: ["Beinödeme", "Lungenödem", "Halsvenenstauung", "Aszites"], c: "Lungenödem"},
        {q: "Füllungsphase des Herzens?", a: ["Systole", "Diastole", "Pulsation", "Depolarisation"], c: "Diastole"},
        {q: "Merkmal stabile Angina Pectoris?", a: ["Dauerschmerz", "Besserung durch Ruhe/Nitro", "Immer Atemnot", "Blutdruckabfall"], c: "Besserung durch Ruhe/Nitro"}
    ],
    "2. Atmungssystem": [
        {q: "Wie viele Lungenlappen hat die linke Lunge?", a: ["1", "2", "3", "4"], c: "2"},
        {q: "Ort des Gasaustausches?", a: ["Bronchiolen", "Trachea", "Alveolen", "Pleura"], c: "Alveolen"},
        {q: "Wichtigster Atemmuskel?", a: ["M. pectoralis", "Zwerchfell", "Zwischenrippenmuskeln", "Bauchmuskeln"], c: "Zwerchfell"},
        {q: "Normaler Blut-pH-Wert?", a: ["7,0", "7,35 - 7,45", "6,8", "7,8"], c: "7,35 - 7,45"},
        {q: "Was ist der 'Totraum'?", a: ["Alveolen ohne Blut", "Atemwege ohne Gasaustausch", "Lungenkollaps", "Zwerchfelllähmung"], c: "Atemwege ohne Gasaustausch"},
        {q: "Schutz beim Schlucken?", a: ["Epiglottis", "Stimmband", "Schilddrüse", "Zäpfchen"], c: "Epiglottis"},
        {q: "Definition Atelektase?", a: ["Entzündung", "Minderbelüftetes Areal", "Pleurawasser", "Krebs"], c: "Minderbelüftetes Areal"},
        {q: "Stärkster Atemanreiz?", a: ["Sauerstoffmangel", "CO2-Anstieg", "Stickstoff", "Helium"], c: "CO2-Anstieg"},
        {q: "Definition Pneumothorax?", a: ["Luft im Pleuraspalt", "Wasser in Lunge", "Eiter im Bronchus", "Blut im Herzbeutel"], c: "Luft im Pleuraspalt"},
        {q: "Lage des Atemzentrums?", a: ["Kleinhirn", "Großhirnrinde", "Medulla oblongata", "Thalamus"], c: "Medulla oblongata"}
    ],
    "3. Verdauungstrakt": [
        {q: "Enzym für Kohlenhydrate im Mund?", a: ["Pepsin", "Amylase", "Lipase", "Trypsin"], c: "Amylase"},
        {q: "Welche Magenzellen bilden HCl?", a: ["Hauptzellen", "Belegzellen", "Nebenzellen", "G-Zellen"], c: "Belegzellen"},
        {q: "Hauptort der Resorption?", a: ["Magen", "Dünndarm", "Dickdarm", "Ösophagus"], c: "Dünndarm"},
        {q: "Produktion der Galle?", a: ["Gallenblase", "Leber", "Pankreas", "Milz"], c: "Leber"},
        {q: "Aufgabe der Galle?", a: ["Eiweißspaltung", "Fettemulgierung", "Zuckerabbau", "Abwehr"], c: "Fettemulgierung"},
        {q: "Erster Dünndarmabschnitt?", a: ["Jejunum", "Ileum", "Duodenum", "Caecum"], c: "Duodenum"},
        {q: "Wo wird Insulin gebildet?", a: ["Leber", "Langerhans-Inseln", "Nebenniere", "Hypophyse"], c: "Langerhans-Inseln"},
        {q: "Hauptaufgabe Dickdarm?", a: ["Eiweißverdauung", "Wasserresorption", "Vit-C-Produktion", "Blutspeicher"], c: "Wasserresorption"},
        {q: "Gefäß zur Leber?", a: ["Vena Cava", "Vena Portae", "A. hepatica", "Aorta"], c: "Vena Portae"},
        {q: "Was ist Aszites?", a: ["Obstipation", "Bauchwassersucht", "Gallensteine", "Ikterus"], c: "Bauchwassersucht"}
    ],
    "4. Harnwegssystem": [
        {q: "Was ist das Nephron?", a: ["Hormon", "Funktionelle Niereneinheit", "Harnleiter", "Nerv"], c: "Funktionelle Niereneinheit"},
        {q: "Ort der Primärharnbildung?", a: ["Nierenbecken", "Glomerulus", "Blase", "Sammelrohr"], c: "Glomerulus"},
        {q: "Primärharn pro Tag?", a: ["1,5 L", "18 L", "180 L", "50 L"], c: "180 L"},
        {q: "Wasserrückgewinnungshormon?", a: ["ADH", "Insulin", "Adrenalin", "Thyroxin"], c: "ADH"},
        {q: "Harnspeicherorgan?", a: ["Nierenbecken", "Harnblase", "Ureter", "Urethra"], c: "Harnblase"},
        {q: "Produktionsort EPO?", a: ["Knochenmark", "Niere", "Leber", "Milz"], c: "Niere"},
        {q: "Definition Zystitis?", a: ["Nierenentzündung", "Blasenentzündung", "Stein", "Prostata-CA"], c: "Blasenentzündung"},
        {q: "Kein Normalbefund im Urin?", a: ["Harnstoff", "Glukose", "Kreatinin", "Harnsäure"], c: "Glukose"},
        {q: "Aufgabe RAAS-System?", a: ["Blutzucker", "Blutdruck/Elektrolyte", "Temperatur", "Schlaf"], c: "Blutdruck/Elektrolyte"},
        {q: "Lage der Nieren?", a: ["Intraperitoneal", "Retroperitoneal", "Becken", "Thorax"], c: "Retroperitoneal"}
    ],
    "5. Neurologie": [
        {q: "Welcher Nerv ist der Vagus?", a: ["Sehnerv", "10. Hirnnerv", "Ischias", "5. Hirnnerv"], c: "10. Hirnnerv"},
        {q: "Aufgabe Kleinhirn?", a: ["Denken", "Koordination", "Sehen", "Hören"], c: "Koordination"},
        {q: "Blut-Hirn-Schranke?", a: ["Knochen", "Barriere Blut/ZNS", "Halsvene", "Hirnhaut"], c: "Barriere Blut/ZNS"},
        {q: "Verbindung zw. Nervenzellen?", a: ["Axon", "Dendrit", "Synapse", "Kern"], c: "Synapse"},
        {q: "Fight or Flight System?", a: ["Parasympathikus", "Sympathikus", "Somatisch", "Enterisch"], c: "Sympathikus"},
        {q: "Parkinson-Symptom?", a: ["Ruhetremor", "Spastik", "Blindheit", "Hörverlust"], c: "Ruhetremor"},
        {q: "Bildung Liquor?", a: ["Mark", "Ventrikel", "Hypophyse", "Milz"], c: "Ventrikel"},
        {q: "Was ist Aphasie?", a: ["Gangstörung", "Sprachstörung", "Sehstörung", "Demenz"], c: "Sprachstörung"},
        {q: "Parasympathikus steuert?", a: ["Stress", "Erholung/Verdauung", "Kraft", "Flucht"], c: "Erholung/Verdauung"},
        {q: "Verbindung der Hemisphären?", a: ["Balken", "Thalamus", "Hypothalamus", "Pons"], c: "Balken"}
    ],
    "6. Infektionsschutz (IfSG)": [
        {q: "Wer darf Heilkunde ausüben?", a: ["Jeder", "Ärzte/HP", "Physios", "Apotheker"], c: "Ärzte/HP"},
        {q: "Behandlungsverbot HP?", a: ["§ 1 IfSG", "§ 6 IfSG", "§ 24 IfSG", "§ 34 IfSG"], c: "§ 24 IfSG"},
        {q: "Meldepflicht Windpocken?", a: ["Nein", "Ja (§6)", "Nur bei Tod", "Nur Schule"], c: "Ja (§6)"},
        {q: "Behandlung Geschlechtskrankheit?", a: ["Ja", "Nein (IfSG Verbot)", "Mit Arzt", "Nur Privat"], c: "Nein (IfSG Verbot)"},
        {q: "Primäres HP-Gesetz?", a: ["BGB", "HeilpG", "StGB", "AMG"], c: "HeilpG"},
        {q: "Verdacht Tollwut?", a: ["Nicht melden", "Sofort melden", "Nur Biss", "Nur Tierarzt"], c: "Sofort melden"},
        {q: "Inhalt §34 IfSG?", a: ["Meldung", "Schulen/Gemeinschaftseinrichtungen", "Labor", "Impfung"], c: "Schulen/Gemeinschaftseinrichtungen"},
        {q: "Meldung wohin?", a: ["Gesundheitsamt", "Polizei", "Finanzamt", "Ärztekammer"], c: "Gesundheitsamt"},
        {q: "Impfung durch HP?", a: ["Nein", "Ja, ist erlaubt", "Nur Kinder", "Nur Arzt"], c: "Ja, ist erlaubt"},
        {q: "Sinn des IfSG?", a: ["Heilung", "Vorbeugung/Früherkennung", "Verkauf", "Statistik"], c: "Vorbeugung/Früherkennung"}
    ],
    "7. Notfall & Labor": [
        {q: "Reanimation Verhältnis?", a: ["15:2", "30:2", "10:1", "5:1"], c: "30:2"},
        {q: "Definition Schock?", a: ["Angst", "Sauerstoffmangel im Gewebe", "Infarkt", "Synkope"], c: "Sauerstoffmangel im Gewebe"},
        {q: "Entzündungswert?", a: ["Blutdruck", "CRP", "Puls", "Hb"], c: "CRP"},
        {q: "Anaphylaxie Symptom?", a: ["Bluthochdruck", "Atemnot/Blutdruckabfall", "Fieber", "Kälte"], c: "Atemnot/Blutdruckabfall"},
        {q: "Kardiogener Schock Lagerung?", a: ["Beine hoch", "Oberkörper hoch", "Flach", "Links"], c: "Oberkörper hoch"},
        {q: "Leukozytose?", a: ["Zu wenig Erythrozyten", "Zu viele Leukozyten", "Krebs", "Anämie"], c: "Zu viele Leukozyten"},
        {q: "HbA1c Messung?", a: ["Aktueller Zucker", "Langzeitzucker", "Fette", "Eisen"], c: "Langzeitzucker"},
        {q: "Bewusstlos + normale Atmung?", a: ["HLW", "Stabile Seitenlage", "Schocklage", "Sitzen"], c: "Stabile Seitenlage"},
        {q: "Hyperkaliämie?", a: ["Zu viel Zucker", "Zu viel Kalium", "Zu viel Salz", "Zu wenig Wasser"], c: "Zu viel Kalium"},
        {q: "Quick / INR?", a: ["Gerinnung", "Blutdruck", "Niere", "Hören"], c: "Gerinnung"}
    ]
};

let qIdx = 0;
let score = 0;
let currentCat = "";

function initNav() {
    const nav = document.getElementById('navigation');
    for (let cat in examDB) {
        const tab = document.createElement('div');
        tab.className = 'tab';
        tab.innerHTML = `<span>${cat}</span> <span class="tab-count">10</span>`;
        tab.onclick = () => start(cat, tab);
        nav.appendChild(tab);
    }
}

// Fisher-Yates Shuffle für die Antworten
function shuffleArray(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
}

function start(cat, element) {
    currentCat = cat;
    qIdx = 0; 
    score = 0;
    document.getElementById('start-view').style.display = 'none';
    document.getElementById('result-screen').style.display = 'none';
    document.getElementById('quiz-view').style.display = 'block';
    
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    if(element) element.classList.add('active');
    
    loadQ();
}

function loadQ() {
    const q = examDB[currentCat][qIdx];
    const nextBtn = document.getElementById('nextBtn');
    nextBtn.disabled = true;
    nextBtn.innerText = qIdx === 9 ? "ZUR AUSWERTUNG" : "WEITER";
    
    document.getElementById('category-name').innerText = currentCat;
    document.getElementById('question-counter').innerText = `${qIdx + 1} / 10`;
    document.getElementById('p-fill').style.width = ((qIdx + 1) / 10 * 100) + "%";
    document.getElementById('q-text').innerText = q.q;
    
    // Shuffle der Antworten für diese Runde
    const shuffledAnswers = shuffleArray([...q.a]);
    
    const opts = document.getElementById('options');
    opts.innerHTML = '';
    
    shuffledAnswers.forEach((txt) => {
        const b = document.createElement('button');
        b.className = 'option-btn';
        b.innerText = txt;
        b.onclick = () => {
            document.querySelectorAll('.option-btn').forEach(btn => btn.disabled = true);
            // Wir prüfen gegen den Text der richtigen Antwort (q.c ist jetzt der Text)
            if(txt === q.c) { 
                b.classList.add('correct'); 
                score++; 
            } else { 
                b.classList.add('wrong'); 
                // Markiere die richtige Antwort (finde den Button mit dem richtigen Text)
                document.querySelectorAll('.option-btn').forEach(btn => {
                    if(btn.innerText === q.c) btn.classList.add('correct');
                });
            }
            nextBtn.disabled = false;
        };
        opts.appendChild(b);
    });
}

document.getElementById('nextBtn').onclick = () => {
    if(qIdx < 9) { 
        qIdx++; 
        loadQ(); 
    } else {
        document.getElementById('quiz-view').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        document.getElementById('score-val').innerText = `${score}/10`;
        document.getElementById('feedback-text').innerText = score >= 7 ? 
            "Hervorragendes Fachwissen! Sie sind bereit für die Prüfung." : 
            "Gute Basis, aber vertiefen Sie dieses Thema noch einmal.";
    }
};

// Reset-Funktion für das Hauptmenü
document.getElementById('backToMenuBtn').onclick = () => {
    document.getElementById('result-screen').style.display = 'none';
    document.getElementById('quiz-view').style.display = 'none';
    document.getElementById('start-view').style.display = 'block';
    // Entferne Markierung in der Sidebar
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    currentCat = "";
};

document.getElementById('toggleMode').onclick = () => {
    document.body.classList.toggle('light');
};

initNav();
</script>
</body>
</html>
